<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Munus — Saved Jobs</title>
  <link rel="stylesheet" href="jobs.css">
</head>
<body>
  <header class="page-header">
    <div class="brand">
      <span class="title">Munus</span>
    </div>
    <div class="header-right">
      <span id="job-count" class="job-count"></span>
      <button id="open-new-job" class="new-job-btn">+ New Job</button>
      <button id="open-settings" class="icon-btn" title="Settings">&#9881;</button>
    </div>
  </header>

  <main>
    <div class="filter-bar">
      <input type="search" id="search-input" placeholder="Search role or company…">
      <button id="delete-selected-btn" class="delete-selected-btn hidden">Delete</button>
      <select id="status-filter">
        <option value="">All statuses</option>
        <option value="saved">Saved</option>
        <option value="applied">Applied</option>
        <option value="interviewing">Interviewing</option>
        <option value="offered">Offered</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>

    <div id="empty-state" class="empty-state hidden">
      <p>No jobs saved yet.</p>
      <p class="hint">Click the Munus extension icon on any job posting to save it.</p>
    </div>

    <div id="table-wrap" class="table-wrap hidden">
      <table id="jobs-table">
        <thead>
          <tr>
            <th class="check-col"><input type="checkbox" id="select-all" title="Select all"></th>
            <th data-col="role">Role</th>
            <th data-col="company">Company</th>
            <th data-col="deadline">Deadline</th>
            <th data-col="pay">Pay</th>
            <th data-col="location">Location</th>
            <th>Status</th>
            <th>Apply</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="jobs-body"></tbody>
      </table>
    </div>
  </main>

  <div id="new-job-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Add Job">
      <div class="modal-header">
        <h2 class="modal-title">Add Job</h2>
        <button id="close-new-job" class="modal-close" title="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="settings-field">
            <label for="nj-role">Role <span class="required">*</span></label>
            <input id="nj-role" type="text" placeholder="Software Engineer">
          </div>
          <div class="settings-field">
            <label for="nj-company">Company <span class="required">*</span></label>
            <input id="nj-company" type="text" placeholder="Acme Corp">
          </div>
          <div class="settings-field">
            <label for="nj-location">Location</label>
            <input id="nj-location" type="text" placeholder="Remote">
          </div>
          <div class="settings-field">
            <label for="nj-pay">Pay</label>
            <input id="nj-pay" type="text" placeholder="$80k–$120k/yr">
          </div>
          <div class="settings-field">
            <label for="nj-deadline">Deadline</label>
            <input id="nj-deadline" type="text" placeholder="Jan 31, 2025">
          </div>
          <div class="settings-field">
            <label for="nj-apply-url">Apply URL</label>
            <input id="nj-apply-url" type="text" placeholder="https://...">
          </div>
        </div>
        <div class="settings-field">
          <label for="nj-status">Status</label>
          <select id="nj-status">
            <option value="saved">Saved</option>
            <option value="applied">Applied</option>
            <option value="interviewing">Interviewing</option>
            <option value="offered">Offered</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-new-job-btn" class="modal-save-btn">Add Job</button>
        <span id="new-job-error" class="save-status error"></span>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal-header">
        <h2 class="modal-title">Settings</h2>
        <button id="close-modal" class="modal-close" title="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <p class="settings-section-label">OpenRouter API</p>

        <div class="settings-field">
          <label for="api-key">API Key</label>
          <div class="settings-input-wrap">
            <input id="api-key" type="password" placeholder="sk-or-..." autocomplete="off" spellcheck="false">
            <button id="toggle-key" type="button" class="toggle-btn">Show</button>
          </div>
          <p class="settings-hint">Get your key at <span class="link-hint">openrouter.ai/keys</span></p>
        </div>

        <div class="settings-field">
          <label for="model">Model</label>
          <input id="model" type="text" placeholder="openai/gpt-4o-mini" autocomplete="off" spellcheck="false">
          <p class="settings-hint">Any OpenRouter model slug. Defaults to <code>openai/gpt-4o-mini</code> if blank.</p>
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-settings-btn" class="modal-save-btn">Save</button>
        <span id="settings-save-status" class="save-status"></span>
      </div>
    </div>
  </div>

  <script src="jobs.js"></script>
</body>
</html>
