<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Munus — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="brand">
        <span class="title">Munus Settings</span>
      </div>
    </header>

    <main>
      <div class="card">
        <h2 class="section-title">OpenRouter API</h2>

        <div class="field">
          <label for="api-key">API Key</label>
          <div class="input-wrap">
            <input
              id="api-key"
              type="password"
              placeholder="sk-or-..."
              autocomplete="off"
              spellcheck="false"
            >
            <button id="toggle-key" class="toggle-btn" type="button">Show</button>
          </div>
          <p class="hint">Get your key at <span class="link-hint">openrouter.ai/keys</span></p>
        </div>

        <div class="field">
          <label for="model">Model</label>
          <input
            id="model"
            type="text"
            placeholder="openai/gpt-4o-mini"
            autocomplete="off"
            spellcheck="false"
          >
          <p class="hint">Any OpenRouter model slug. Defaults to <code>openai/gpt-4o-mini</code> if blank.</p>
        </div>

        <div class="actions">
          <button id="save-btn" class="save-btn">Save Settings</button>
          <span id="save-status" class="save-status"></span>
        </div>
      </div>
    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
